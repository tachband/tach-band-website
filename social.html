<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tach! – Social</title>

<style>

:root{
--bg:#0b0b0f;
--card:#14141a;
--accent:#e21d2d;
--text:#ffffff;
--muted:#9a9aa3;
--line:#2a2a33;
}

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:var(--bg);
color:var(--text);
}

header{
background:#000;
border-bottom:1px solid var(--line);
}

nav{
max-width:1100px;
margin:auto;
display:flex;
justify-content:center;
gap:18px;
padding:18px;
flex-wrap:wrap;
}

nav a{
color:white;
text-decoration:none;
font-weight:bold;
padding:8px 12px;
border-radius:8px;
}

nav a.active{
background:var(--accent);
}

.container{
max-width:900px;
margin:60px auto;
padding:20px;
}

.card{
background:var(--card);
padding:30px;
border-radius:14px;
border:1px solid var(--line);
text-align:center;
}

.social-links{
margin-top:30px;
display:flex;
flex-direction:column;
gap:20px;
}

.social-btn{
display:inline-block;
padding:16px;
border-radius:10px;
background:#1a1a1f;
border:1px solid var(--line);
color:white;
text-decoration:none;
font-size:18px;
transition:0.2s;
}

.social-btn:hover{
background:var(--accent);
}

footer{
text-align:center;
padding:30px;
border-top:1px solid var(--line);
color:var(--muted);
}

</style>

</head>

<body>

<header>

<nav>
<a href="index.html">Start</a>
<a href="band.html">Band</a>
<a href="musik.html">Musik</a>
<a href="tour.html">Tour</a>
<a href="merch.html">Merch</a>
<a href="social.html" class="active">Social</a>
<a href="impressum.html">Impressum</a>
</nav>

</header>

<div class="container">

<div class="card">

<h1>Social Media</h1>

<p>
Folge Tach! auf unseren Social Media Kanälen.
</p>

<div class="social-links">

<a
class="social-btn"
href="https://www.instagram.com/tach.band/"
target="_blank">
📸 Instagram
</a>

<a
class="social-btn"
href="https://www.youtube.com/@Tach-Band"
target="_blank">
▶ YouTube
</a>

</div>

</div>

</div>

<footer>

© 2026 Tach! • tach.band@gmail.com

</footer>

</body>
</html>
