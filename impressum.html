<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tach! – Impressum</title>

<style>

:root{
--bg:#09090b;
--bg2:#111116;
--card:#14141a;
--accent:#e21d2d;
--text:#ffffff;
--muted:#a4a4ad;
--line:#2a2a33;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:linear-gradient(180deg,var(--bg),var(--bg2));
color:white;
}

header{
background:black;
border-bottom:1px solid var(--line);
}

nav{
display:flex;
justify-content:center;
gap:16px;
padding:16px;
flex-wrap:wrap;
}

nav a{
color:white;
text-decoration:none;
font-weight:bold;
padding:8px 12px;
border-radius:6px;
}

nav a:hover,
nav a.active{
background:var(--accent);
}

.section{
max-width:900px;
margin:auto;
padding:40px 20px;
}

.card{
background:var(--card);
padding:30px;
border-radius:14px;
border:1px solid var(--line);
margin-bottom:30px;
}

form{
display:flex;
flex-direction:column;
gap:14px;
margin-top:20px;
}

input,textarea{
padding:12px;
border-radius:8px;
border:none;
background:#111;
color:white;
}

button{
background:var(--accent);
border:none;
padding:14px;
border-radius:10px;
color:white;
font-weight:bold;
cursor:pointer;
}

footer{
text-align:center;
padding:30px;
border-top:1px solid var(--line);
color:var(--muted);
}

</style>
</head>

<body>

<header>
<nav>
<a href="index.html">Start</a>
<a href="band.html">Band</a>
<a href="musik.html">Musik</a>
<a href="tour.html">Tour</a>
<a href="merch.html">Merch</a>
<a href="social.html">Social</a>
<a href="impressum.html" class="active">Impressum</a>
</nav>
</header>

<section class="section">

<div class="card">

<h2>Impressum</h2>

<p>
Tach! Band<br>
Deutschland
</p>

<br>

<p>
Kontakt:<br>
tach.band@gmail.com
</p>

</div>

<div class="card">

<h2>Anfragen</h2>

<form action="https://formspree.io/f/mvzwgdro" method="POST">

<input type="text" name="name" placeholder="Name">

<input type="email" name="email" placeholder="E-Mail" required>

<textarea name="message" placeholder="Nachricht" rows="5"></textarea>

<button type="submit">Nachricht senden</button>

</form>

</div>

</section>

<footer>
© 2026 Tach!
</footer>

</body>
</html>
