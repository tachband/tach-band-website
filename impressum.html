<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tach! – Impressum</title>
  <style>
    :root{--bg:#09090b;--bg2:#111116;--card:#14141a;--card2:#1a1a22;--accent:#e21d2d;--text:#ffffff;--muted:#a4a4ad;--line:#2a2a33;}
    *{margin:0;padding:0;box-sizing:border-box;font-family:Arial, Helvetica, sans-serif;}
    body{background:linear-gradient(180deg,var(--bg),var(--bg2));color:white;}
    header{width:100%;background:rgba(0,0,0,0.96);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:1000;}
    .nav-wrap{max-width:1200px;margin:auto;padding:14px 16px;}
    .nav-top{display:flex;align-items:center;justify-content:space-between;gap:16px;}
    .brand{color:#fff;text-decoration:none;font-weight:bold;font-size:20px;letter-spacing:1px;}
    .menu-toggle{display:none;background:transparent;border:1px solid var(--line);color:#fff;border-radius:10px;padding:10px 14px;font-size:24px;cursor:pointer;}
    nav{display:flex;justify-content:center;gap:16px;flex-wrap:wrap;margin-top:10px;}
    nav a{color:white;text-decoration:none;font-weight:bold;padding:8px 12px;border-radius:8px;}
    nav a.active,nav a:hover{background:var(--accent);}
    .section{max-width:900px;margin:auto;padding:40px 20px;}
    .card{background:linear-gradient(180deg,var(--card),var(--card2));padding:30px;border-radius:14px;border:1px solid var(--line);margin-bottom:30px;}
    form{display:flex;flex-direction:column;gap:14px;margin-top:20px;}
    input,textarea{padding:12px;border-radius:8px;border:none;background:#111;color:white;}
    button{background:var(--accent);border:none;padding:14px;border-radius:10px;color:white;font-weight:bold;cursor:pointer;}
    p{color:var(--muted);line-height:1.6;}
    footer{text-align:center;padding:30px;border-top:1px solid var(--line);color:var(--muted);background:#0a0a0c;}
    @media (max-width:760px){
      .menu-toggle{display:block;}
      nav{display:none;flex-direction:column;align-items:stretch;gap:10px;margin-top:14px;}
      nav.open{display:flex;}
      nav a{display:block;text-align:center;width:100%;}
    }
  </style>
</head>
<body>

<header>
  <div class="nav-wrap">
    <div class="nav-top">
      <a href="index.html" class="brand">TACH!</a>
      <button class="menu-toggle" id="menuToggle">☰</button>
    </div>
    <nav id="mainNav">
      <a href="index.html">Start</a>
      <a href="band.html">Band</a>
      <a href="musik.html">Musik</a>
      <a href="tour.html">Tour</a>
      <a href="merch.html">Merch</a>
      <a href="social.html">Social</a>
      <a href="impressum.html" class="active">Impressum</a>
    </nav>
  </div>
</header>

<section class="section">
  <div class="card">
    <h2>Impressum</h2>
    <p>Tach! Band<br>Deutschland</p>
    <br>
    <p>Kontakt:<br>tach.band@gmail.com</p>
  </div>

  <div class="card">
    <h2>Anfragen</h2>
    <form action="https://formspree.io/f/mvzwgdro" method="POST">
      <input type="text" name="name" placeholder="Name">
      <input type="email" name="email" placeholder="E-Mail" required>
      <textarea name="message" placeholder="Nachricht" rows="5"></textarea>
      <button type="submit">Nachricht senden</button>
    </form>
  </div>
</section>

<footer>© 2026 Tach!</footer>

<script>
  const menuToggle = document.getElementById('menuToggle');
  const mainNav = document.getElementById('mainNav');
  menuToggle.addEventListener('click', () => {
    mainNav.classList.toggle('open');
    menuToggle.textContent = mainNav.classList.contains('open') ? '✕' : '☰';
  });
</script>

</body>
</html>
