<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tach! – Merch</title>
  <style>
    :root{--bg:#0b0b0d;--panel:#141417;--panel2:#1b1b20;--text:#f2f2f2;--muted:#b7b7bd;--accent:#d1122a;--line:#2a2a31;}
    *{box-sizing:border-box}
    body{margin:0;font-family:Arial, Helvetica, sans-serif;background:linear-gradient(180deg,#09090b 0%, #111116 100%);color:var(--text);}
    nav{position:sticky;top:0;z-index:1000;display:flex;justify-content:center;flex-wrap:wrap;gap:10px;background:rgba(10,10,12,.96);border-bottom:1px solid var(--line);padding:16px 12px;backdrop-filter:blur(8px);}
    nav a{color:#fff;text-decoration:none;font-weight:bold;padding:10px 14px;border-radius:8px;}
    nav a:hover, nav a.active{background:var(--accent);}
    .wrap{max-width:1100px;margin:40px auto;padding:0 20px;}
    .card{background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid var(--line);border-radius:16px;padding:32px 24px;box-shadow:0 10px 30px rgba(0,0,0,.25);}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:18px;margin-top:20px;}
    .item{background:#111116;border:1px solid var(--line);padding:20px;border-radius:12px;}
    .btn{display:inline-block;padding:14px 24px;border-radius:8px;text-decoration:none;font-weight:bold;color:#fff;background:var(--accent);margin-top:8px;}
    h1{margin-top:0}
    p{line-height:1.6;color:var(--muted);}
    footer{margin-top:50px;text-align:center;padding:30px 20px;background:#0a0a0c;border-top:1px solid var(--line);color:#999;}
    footer a{color:#fff;text-decoration:none;}
  </style>
</head>
<body>
  <nav>
    <a href="index.html">Start</a>
    <a href="band.html">Band</a>
    <a href="musik.html">Musik</a>
    <a href="tour.html" class="active">Tour</a>
    <a href="merch.html">Merch</a>
    <a href="social.html">Social</a>
    <a href="impressum.html">Impressum</a>
  </nav>

  <div class="wrap">
    <div class="card">
      <h1>👕 Merch</h1>
      <p>Hier können später eure Produkte rein.</p>

      <div class="grid">
        <div class="item">
          <h3>Bandshirt</h3>
          <p>Schwarzes Shirt mit Tach!-Logo.</p>
        </div>
        <div class="item">
          <h3>Poster</h3>
          <p>Poster im Band-Stil für Proberaum oder Bühne.</p>
        </div>
        <div class="item">
          <h3>Sticker</h3>
          <p>Klein, direkt, auffällig.</p>
        </div>
      </div>

      <a class="btn" href="#">Merch folgt</a>
    </div>
  </div>

  <footer>
    © 2026 Tach! • <a href="mailto:tach.band@gmail.com">tach.band@gmail.com</a>
  </footer>
</body>
</html>
